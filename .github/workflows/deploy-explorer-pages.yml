name: Deploy Explorer to Pages

on:
  push:
    branches: ["dev"]
    paths: [ ".github/workflows/deploy-explorer-pages.yml", "Src/**", "Benchmarks/**", "Generators/**", "Resources/**", "Samples/**", "Tests/**", "Tools/**", "GBX.NET.slnx" ]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set DOTNET_INSTALL_DIR
        run: echo "DOTNET_INSTALL_DIR=$HOME/.dotnet" >> $GITHUB_ENV

      - name: Cache Workloads
        if: inputs.workloads != ''
        id: cache-workloads
        uses: actions/cache@v5
        with:
          path: |
            ~/.dotnet/metadata
            ~/.dotnet/packs
            ~/.dotnet/library-packs
          key: ${{ runner.os }}-workloads-${{ inputs.dotnet-version }}-${{ inputs.workloads }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            10.0.x
            9.0.x
            8.0.x
          workloads: wasm-tools

      - name: Cache NuGet Packages
        if: inputs.enable-cache
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      
      - name: Patch base href in index.html
        run: sed -i 's/<base href="\/" \/>/<base href="\/${{ github.event.repository.name }}\/" \/>/g' ${{ inputs.project }}/wwwroot/index.html

      - name: Patch base in service-worker.published.js
        run: sed -i 's/const base = "\//const base = "\/${{ github.event.repository.name }}\//g' ${{ inputs.project }}/wwwroot/service-worker.published.js

      - name: Publish
        run: dotnet build Tools/GbxExplorerOld/Client && dotnet publish Tools/GbxExplorerOld/Client -c Release --nologo -o publish /p:ContinuousIntegrationBuild=true
        
      - name: Add .nojekyll file
        run: touch publish/wwwroot/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: publish/wwwroot/.
        
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
